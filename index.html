<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>球迷人格测试</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- ====== 答题页（直接进入） ====== -->
  <div id="page-quiz" class="page active">
    <div class="quiz-top-fixed">
      <div class="quiz-header">
        <span class="quiz-dim-label">球迷人格测试</span>
        <span id="quiz-progress-text" class="quiz-page-num">0 / 31</span>
      </div>
      <div class="progress-bar-bg">
        <div id="progress-fill" class="progress-bar-fill" style="width: 0%"></div>
      </div>
    </div>
    <div id="quiz-container" class="quiz-container"></div>
    <div class="quiz-footer">
      <div class="quiz-footer-btns">
        <button id="btn-prev" class="btn-prev" style="display:none">上一页</button>
        <button id="btn-next" class="btn-next">下一页</button>
      </div>
    </div>
  </div>

  <!-- ====== Toast ====== -->
  <div id="toast" class="toast"></div>

  <!-- ====== 结果页 ====== -->
  <div id="page-result" class="page">

    <!-- ① 英雄区 -->
    <div id="result-hero" class="result-hero">
      <div class="hero-badge">你的球迷人格</div>
      <div class="hero-user-row">
        <div class="hero-avatar" id="result-avatar"></div>
        <div class="hero-user-info">
          <div id="result-nickname" class="hero-nickname"></div>
          <div id="result-ballage" class="hero-ballage"></div>
        </div>
      </div>
      <div id="result-code" class="hero-code"></div>
      <div id="result-name" class="hero-name"></div>
      <div id="result-star" class="hero-star-badge"></div>
      <p id="result-tagline" class="hero-tagline"></p>
      <button id="btn-share" class="btn-share">生成卡片分享</button>
    </div>

    <!-- ② 5大模型得分 -->
    <div class="result-section">
      <div class="section-title">你的球迷维度</div>
      <div id="model-bars" class="dimension-bars"></div>
    </div>

    <!-- ③ 免费摘要 -->
    <div class="result-section">
      <div class="section-title">球迷画像</div>
      <p id="result-summary" class="result-summary"></p>
      <div id="result-stat" class="result-stat"></div>
    </div>

    <!-- ④ 付费蒙层区 -->
    <div id="paywall-wrap" class="paywall-wrap">
      <div class="section-title">完整解析</div>
      <div class="paywall-content">
        <div id="full-result-text" class="full-result-text"></div>
        <div id="paywall-mask" class="paywall-mask">
          <div class="paywall-buttons">
            <button id="btn-unlock-pay" class="btn-pay">¥1.9 立即解锁</button>
            <button id="btn-unlock-video" class="btn-video">看激励视频 免费获取完整解析</button>
          </div>
        </div>
      </div>
    </div>

    <!-- ⑤ 底部（付费墙后） -->
    <button id="btn-retry" class="btn-retry" style="display:none">再测一次</button>

    <!-- ⑥ 分享卡片弹窗 -->
    <div id="share-modal" class="share-modal">
      <div class="share-modal-inner">
        <canvas id="share-canvas"></canvas>
        <button id="btn-save-card" class="btn-save-card">保存图片</button>
        <button id="btn-close-modal" class="btn-close-modal">关闭</button>
      </div>
    </div>

  </div>

  <script src="js/questions.js"></script>
  <script src="js/results.js"></script>
  <script src="js/algorithm.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
