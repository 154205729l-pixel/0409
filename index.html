<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>球迷人格测试</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- ====== 答题页（直接进入） ====== -->
  <div id="page-quiz" class="page active">
    <div class="quiz-top-fixed">
      <div class="quiz-header">
        <span class="quiz-dim-label">球迷人格测试</span>
        <span id="quiz-progress-text" class="quiz-page-num">0 / 31</span>
      </div>
      <div class="progress-bar-bg">
        <div id="progress-fill" class="progress-bar-fill" style="width: 0%"></div>
      </div>
    </div>
    <div id="quiz-container" class="quiz-container"></div>
    <div class="quiz-footer">
      <div class="quiz-footer-btns">
        <button id="btn-prev" class="btn-prev" style="display:none">上一页</button>
        <button id="btn-next" class="btn-next">下一页</button>
      </div>
    </div>
  </div>

  <!-- ====== Toast ====== -->
  <div id="toast" class="toast"></div>

  <!-- ====== 结果页 ====== -->
  <div id="page-result" class="page">

    <!-- ① 英雄区（横排布局） -->
    <header id="result-hero" class="r-hero">
      <div class="r-hero-row">
        <div class="r-avatar" id="result-avatar"></div>
        <div class="r-hero-main">
          <p class="r-kicker">我的球迷JBTI人格</p>
          <h1 class="r-code" id="result-code"></h1>
          <div class="r-name" id="result-name"></div>
          <p class="r-tagline" id="result-tagline"></p>
        </div>
        <aside class="r-hero-side">
          <p class="r-side-label">代表球星</p>
          <p class="r-side-star" id="result-star"></p>
          <p class="r-side-hint">仅供参考</p>
        </aside>
      </div>
      <div class="r-hero-user" id="result-user-line"></div>
    </header>

    <!-- ② 画像 + 统计 + 维度条 -->
    <section class="r-content">
      <h2 class="r-h2">我的画像</h2>
      <p class="r-desc" id="result-summary"></p>

      <div class="r-row">
        <div class="r-stat">
          <div class="r-stat-small">目前有</div>
          <div class="r-stat-big" id="result-pct"></div>
          <div class="r-stat-tail">的人和你一样</div>
        </div>
        <div class="r-card">
          <div class="r-card-title">我的球迷维度</div>
          <div id="model-bars"></div>
        </div>
      </div>

      <!-- ③ 分维度解析（付费墙前展示2个，付费后展示全部） -->
      <div id="result-dimensions"></div>
    </section>

    <!-- ④ 付费蒙层区 -->
    <div id="paywall-wrap" class="paywall-wrap">
      <div class="section-title">完整解析</div>
      <div class="paywall-content">
        <div id="full-result-text" class="full-result-text"></div>
        <div id="paywall-mask" class="paywall-mask">
          <div class="paywall-buttons">
            <button id="btn-unlock-pay" class="btn-pay">¥1.9 立即解锁</button>
            <button id="btn-unlock-video" class="btn-video">看激励视频 免费获取完整解析</button>
          </div>
        </div>
      </div>
    </div>

    <!-- ⑤ 底部 -->
    <div class="r-bottom-actions">
      <button id="btn-share" class="r-btn-share">生成卡片分享</button>
      <button id="btn-retry" class="btn-retry" style="display:none">再测一次</button>
    </div>

    <!-- ⑥ 分享卡片弹窗 -->
    <div id="share-modal" class="share-modal">
      <div class="share-modal-inner">
        <canvas id="share-canvas"></canvas>
        <button id="btn-save-card" class="btn-save-card">保存图片</button>
        <button id="btn-close-modal" class="btn-close-modal">关闭</button>
      </div>
    </div>

  </div>

  <script src="js/questions.js"></script>
  <script src="js/results.js"></script>
  <script src="js/algorithm.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
