<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>球迷人格测试</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- ====== 答题页（直接进入） ====== -->
  <div id="page-quiz" class="page active">
    <div class="quiz-top-fixed">
      <div class="quiz-header">
        <span class="quiz-dim-label">球迷人格测试</span>
        <span id="quiz-progress-text" class="quiz-page-num">0 / 19</span>
      </div>
      <div class="progress-bar-bg">
        <div id="progress-fill" class="progress-bar-fill" style="width: 0%"></div>
      </div>
    </div>
    <div id="quiz-container" class="quiz-container"></div>
    <div class="quiz-footer">
      <div class="quiz-footer-btns">
        <button id="btn-prev" class="btn-prev" style="display:none">上一页</button>
        <button id="btn-next" class="btn-next">下一页</button>
      </div>
    </div>
  </div>

  <!-- ====== Toast ====== -->
  <div id="toast" class="toast"></div>

  <!-- ====== 结果页 ====== -->
  <div id="page-result" class="page">

    <!-- ① 英雄区：三列分栏 -->
    <header id="result-hero" class="result-hero">
      <div class="hero-layout">
        <div class="hero-copy">
          <p class="hero-badge">你的球迷人格</p>
          <div class="hero-row">
            <div class="hero-id">
              <div id="result-avatar" class="hero-avatar" aria-hidden="true"></div>
              <div id="result-name" class="hero-name"></div>
            </div>
            <div class="hero-profile">
              <div class="hero-user-info">
                <div id="result-nickname" class="hero-nickname"></div>
                <div id="result-ballage" class="hero-ballage"></div>
              </div>
              <h1 id="result-code" class="hero-code"></h1>
            </div>
            <aside class="hero-side">
              <p class="hero-side-label">代表球星</p>
              <div id="result-star" class="hero-star-badge"></div>
              <button id="btn-share" class="btn-share">生成卡片分享</button>
            </aside>
          </div>
        </div>
      </div>
    </header>

    <section class="content">
      <div class="main-column">
        <!-- ② 球迷画像 -->
        <section class="intro-panel panel">
          <div class="section-title" id="result-section-tagline"></div>
          <p id="result-summary"></p>
        </section>
        <!-- ③ 匹配度 + 球迷维度 -->
        <div class="row">
          <div class="stat-card panel">
            <div id="result-stat" class="result-stat-inner">
              <div class="result-stat-label">与此人格匹配度</div>
              <div id="result-stat-value" class="result-stat-value"></div>
              <div id="result-stat-tail" class="result-stat-tail"></div>
            </div>
          </div>
          <section class="dimension-card panel">
            <div class="card-title">你的球迷维度</div>
            <div id="model-bars" class="dimension-bars"></div>
          </section>
        </div>
      </div>
      <aside class="side-column">
        <!-- ④ 付费蒙层区 -->
        <section id="paywall-wrap" class="paywall-wrap panel">
          <div class="section-title">完整解析</div>
          <div class="analysis-tabs">
            <button class="tab-btn active" data-tab="S">看球姿态</button>
            <button class="tab-btn" data-tab="E">情绪表达</button>
            <button class="tab-btn" data-tab="A">足球态度</button>
            <button class="tab-btn" data-tab="D">驱动力</button>
            <button class="tab-btn" data-tab="C">社交圈</button>
          </div>
          <div class="paywall-content">
            <div id="full-result-text" class="full-result-text"></div>
            <div id="paywall-mask" class="paywall-mask">
              <div class="paywall-buttons">
                <button id="btn-unlock-pay" class="btn-pay" type="button">¥1.9 立即解锁</button>
                <button id="btn-unlock-video" class="btn-video" type="button">看激励视频 免费获取完整解析</button>
              </div>
            </div>
          </div>
        </section>
      </aside>
    </section>

    <!-- ⑤ 底部（付费墙后） -->
    <button id="btn-retry" class="btn-retry" style="display:none">再测一次</button>

    <!-- ⑥ 分享卡片弹窗 -->
    <div id="share-modal" class="share-modal">
      <div class="share-modal-inner">
        <canvas id="share-canvas"></canvas>
        <button id="btn-save-card" class="btn-save-card">保存图片</button>
        <button id="btn-close-modal" class="btn-close-modal">关闭</button>
      </div>
    </div>

  </div>

  <script src="js/questions.js"></script>
  <script src="js/results.js"></script>
  <script src="js/algorithm.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
